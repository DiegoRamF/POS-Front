<section>
  <div class="mb-8 text-2xl text-black font-extrabold font-plusJakartaSans text-center">
    <span class="text-white bg-blue-800 p-2 rounded-xl">NOMBRE</span> DEL SAAS
  </div>

  <div class="bg-white p-8 md:p-10 rounded-4xl shadow-around w-full max-w-lg">

    <div class="text-center mb-8">
      <p class="font-extrabold font-montserrat text-3xl">CREAR CUENTA</p>
    </div>

    @if ( errorMessage() ) {
      <div class="bg-red-100 border border-red-400 text-red-700 p-3 rounded-xl text-sm font-montserrat font-semibold">
        {{ errorMessage() }}
      </div>
    }

    <form
      [formGroup]="registerForm"
      class="flex flex-col gap-5 font-montserrat"
    >
      <div>
        <p class="font-bold text-sm ml-2">Nombre de tu negocio</p>
        <input
          type="text"
          placeholder="Ej. Bodega don lucho"
          class="w-full px-5 py-3 bg-gray-100 rounded-4xl border-2 border-transparent focus:outline-none focus:border-blue-800 transition-colors duration-300"
        >
      </div>

      <div>
        <p class="font-bold text-sm ml-2">Nombre y Apellido</p>
        <input
          type="text"
          placeholder="Ej. Juan Pérez"
          class="w-full px-5 py-3 bg-gray-100 rounded-4xl border-2 border-transparent focus:outline-none focus:border-blue-800 transition-colors duration-300"
        >
      </div>

      <div>
        <p class="font-bold text-sm ml-2">Correo Electronico</p>
        <input
          type="text"
          placeholder="Ej. correo@ejemplo.com"
          class="w-full px-5 py-3 bg-gray-100 rounded-4xl border-2 border-transparent focus:outline-none focus:border-blue-800 transition-colors duration-300"
        >
      </div>

      <div>
        <p class="font-bold text-sm ml-2">Número de teléfono</p>
        <input
          type="text"
          placeholder=""
          class="w-full px-5 py-3 bg-gray-100 rounded-4xl border-2 border-transparent focus:outline-none focus:border-blue-800 transition-colors duration-300"
        >
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <p class="font-bold text-sm ml-2">Contraseña</p>
          <input
            type="text"
            placeholder=""
            class="w-full px-5 py-3 bg-gray-100 rounded-4xl border-2 border-transparent focus:outline-none focus:border-blue-800 transition-colors duration-300"
          >
        </div>

        <div>
          <p class="font-bold text-sm ml-2">Confirmar</p>
          <input
            type="text"
            placeholder="Repite contraseña"
            class="w-full px-5 py-3 bg-gray-100 rounded-4xl border-2 border-transparent focus:outline-none focus:border-blue-800 transition-colors duration-300"
          >
        </div>
      </div>

      <button type="submit" class="mt-4 bg-blue-800 text-white px-8 py-4 rounded-full font-extrabold font-montserratAlternate flex justify-center shadow-around
        transition duration-500 ease-in-out
        hover:bg-blue-900 hover:scale-103">Comenzar gratis
      </button>

      <p class="text-gray-700 text-center text-[13px]">
        ¿Ya tienes una cuenta?
        <a routerLink="/auth/login" class="font-bold text-blue-800">Inicia sesión aquí</a>
      </p>

    </form>

  </div>
</section>
